<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boost Empire Ultimate</title><style>
body{background:linear-gradient(135deg,#020617,#0a1a3a);color:white;font-family:sans-serif;margin:0;}
.container{padding:15px;}
.card{background:#0f172a;padding:15px;margin-top:12px;border-radius:12px;}
input,select,button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:8px;}
button{background:#2563eb;color:white;}
.row{display:flex;gap:10px;}
.box{flex:1;background:#1e293b;padding:10px;border-radius:8px;text-align:center;}
</style></head>
<body><div class="container"><h2>🚀 Boost Empire Ultimate</h2><!-- LOGIN --><div class="card">
<input id="uid" placeholder="Enter Telegram ID">
<button onclick="login()">Login / Search User</button>
</div><div id="app"></div></div><script>

const API="https://licenses-dip-translation-able.trycloudflare.com";
const BOT="https://t.me/BoostEmpire_ProBot";

const PRICE={
tg_members:120,
tg_react:80,
tg_views:50,
ig_follow:150,
ig_like:60,
ig_views:40
};

let USER={};
let UID="";

function login(){
UID=document.getElementById("uid").value;

fetch(API+"/user/"+UID)
.then(r=>r.json())
.then(d=>{
USER=d || {};
render();
});
}

function render(){

// NEW USER CHECK
if(!USER || Object.keys(USER).length===0){
document.getElementById("app").innerHTML=`
<div class="card">
<h3>👋 New User</h3>
<p>No data found. Start bot first.</p>
<button onclick="openBot()">Start Bot</button>
</div>`;
return;
}

document.getElementById("app").innerHTML=`

<!-- PROFILE -->
<div class="card">
<h3>👤 Profile</h3>
ID: ${UID}<br>
Joined: ${new Date((USER.join_time||0)*1000).toLocaleString()}
</div>

<!-- WALLET -->
<div class="card">
<h3>💰 Wallet</h3>
<div class="row">
<div class="box">₹ ${USER.money||0}</div>
<div class="box">🪙 ${USER.credits||0}</div>
</div>
</div>

<!-- STATS -->
<div class="card">
<h3>📊 Stats</h3>
<div class="row">
<div class="box">Orders: ${USER.orders||0}</div>
<div class="box">Ref: ${USER.ref_count||0}</div>
<div class="box">VIP: ${USER.vip> Date.now()/1000 ? "Active" : "No"}</div>
</div>
</div>

<!-- ORDER -->
<div class="card">
<h3>📦 Order</h3>

<select id="service">
<option value="tg_members">Telegram Members</option>
<option value="tg_react">Telegram Reactions</option>
<option value="tg_views">Telegram Views</option>
<option value="ig_follow">Instagram Followers</option>
<option value="ig_like">Instagram Likes</option>
<option value="ig_views">Instagram Views</option>
</select>

<input id="link" placeholder="Enter link">
<input id="qty" placeholder="Quantity">

<button onclick="calc()">Check Price</button>

<div id="preview"></div>

</div>

<!-- TRANSACTIONS -->
<div class="card">
<h3>📜 Transactions</h3>

<input placeholder="Search..." oninput="searchTx(this.value)">

<div id="tx"></div>
</div>

<!-- ORDERS -->
<div class="card">
<h3>📦 Order History</h3>
<div id="orders"></div>
</div>

<!-- LINKS -->
<div class="card">
<h3>🔗 Quick Links</h3>
<button onclick="openBot()">Open Bot</button>
<button onclick="channel()">Channel</button>
<button onclick="wa()">WhatsApp</button>
</div>

`;

loadTx();
loadOrders();
}

function calc(){
let s=document.getElementById("service").value;
let q=parseInt(document.getElementById("qty").value);

if(!q)return alert("Enter quantity");

let price=PRICE[s];
let cost=Math.floor(q*price/1000);

document.getElementById("preview").innerHTML=`
<h4>Confirm Order</h4>
Service: ${s}<br>
Qty: ${q}<br>
Cost: ₹${cost} / ${cost} coins<br><br>

<button onclick="confirmOrder('${s}',${q})">OK</button>
`;
}

function confirmOrder(s,q){
let link=document.getElementById("link").value;
if(!link)return alert("Enter link");

let text=`order_${s}_${q}_${encodeURIComponent(link)}`;
window.location=BOT+"?start="+text;
}

function loadTx(){
let html="";
(USER.transactions||[]).slice(-30).reverse().forEach(t=>{
html+=`
<div class="card">
${t.type} ₹${t.amount}<br>
Reason: ${t.note||"N/A"}<br>
Time: ${new Date((t.time||0)*1000).toLocaleString()}
</div>`;
});
document.getElementById("tx").innerHTML=html;
}

function searchTx(q){
let html="";
(USER.transactions||[]).filter(t=>
JSON.stringify(t).toLowerCase().includes(q.toLowerCase())
).forEach(t=>{
html+=`
<div class="card">
${t.type} ₹${t.amount}<br>
${t.note}
</div>`;
});
document.getElementById("tx").innerHTML=html;
}

function loadOrders(){
let html="";
(USER.order_history||[]).slice(-30).reverse().forEach(o=>{
html+=`
<div class="card">
${o.service}<br>
Qty: ${o.quantity}<br>
Status: ${o.status}<br>
Link: ${o.link}<br>
Time: ${new Date((o.time||0)*1000).toLocaleString()}
</div>`;
});
document.getElementById("orders").innerHTML=html;
}

function openBot(){
window.location=BOT;
}

function channel(){
window.location="https://t.me/boost_empire_official";
}

function wa(){
window.location="https://wa.me/916207022628";
}

</script></body>
</html>
