<script>
function login(user){

    alert("LOGIN SUCCESS\nID: " + user.id);

    fetch("https://web-qv4h.onrender.com/user/" + user.id)
    .then(res => {
        alert("API HIT SUCCESS");
        return res.json();
    })
    .then(data => {

        alert("DATA: " + JSON.stringify(data));

        document.getElementById("dashboard").innerHTML = `
        <div class="card">
            <h2>Welcome ${user.first_name}</h2>
            <p>ID: ${user.id}</p>
            <p>💰 Balance: ₹${data.money || 0}</p>
            <p>🪙 Coins: ${data.credits || 0}</p>
        </div>
        `;

    })
    .catch(err => {
        alert("ERROR: " + err);
    });
}
</script>
